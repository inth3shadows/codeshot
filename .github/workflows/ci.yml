name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read # least privilege — the workflow only reads the repo

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (engines >=18) through current LTS.
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
      # `dot` is a hard runtime dependency (codeshot renders through graphviz); the
      # DOT-validity test shells out to it and fails-hard if absent. The end-to-end
      # `codegraph` tests instead SELF-SKIP when codegraph/its index aren't present —
      # CI has neither — so no codegraph install is needed here.
      - name: Install graphviz (codeshot renders via `dot`)
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - run: npm test

  diagrams:
    name: Diagrams are current (codeshot --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      # codeshot renders through graphviz. --check compares diagram STRUCTURE
      # (node/edge set) for svg, not rendered bytes, so the CI graphviz version
      # need not match the one that generated the committed image.
      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      # The index codeshot reads. Pinned (repo convention: pin dependency versions).
      - name: Install codegraph
        run: npm install -g @colbymchenry/codegraph@1.4.1

      # Build the index AND run --check in ONE step, on purpose. codegraph serves
      # its index from a per-invocation process; splitting "build" and "query"
      # across two GitHub Actions steps intermittently left `codegraph query`
      # reporting "not initialized" — the step boundary kills codegraph's process
      # group before the freshly built on-disk db is finalized, so a later step's
      # fresh process sees no index (whereas the same-step `status` does). Keeping
      # everything in one shell, plus a readiness probe that retries a real query
      # until the index answers, makes it reliable. `init` builds the initial
      # index in a fresh checkout (`index` errors when the repo was never
      # initialized). CODEGRAPH_NO_WATCHDOG=1 stops a throttled runner from
      # tripping codegraph's liveness watchdog (#850) mid-index.
      - name: Build index and check committed diagrams are current
        env:
          CODEGRAPH_NO_WATCHDOG: "1"
        run: |
          codegraph init .
          # Readiness probe: don't --check until a real query resolves against the
          # index. Retries cover the finalize-after-build race above.
          for attempt in 1 2 3 4 5; do
            if codegraph query --path . --json --limit 1 -- buildDot >/dev/null 2>&1; then
              echo "codegraph index is queryable (attempt $attempt)"
              break
            fi
            if [ "$attempt" = 5 ]; then
              echo "::error::codegraph index never became queryable after init"; codegraph status .; exit 1
            fi
            echo "index not queryable yet (attempt $attempt) — syncing and retrying"
            codegraph sync . || true
            sleep 2
          done
          codegraph status .   # visibility: a partial index prints an unresolved-refs warning
          # Blocking gate: fail the PR if either committed diagram no longer matches
          # what the current code produces. Structural compare = graphviz-version proof.
          node render/callgraph.js --architecture --path . --format svg \
            --out docs/architecture.svg --embed TECHNICAL.md --check
          node render/callgraph.js buildDot --path . --format svg \
            --out docs/buildDot-callgraph.svg --embed TECHNICAL.md --check
